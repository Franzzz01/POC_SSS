server.port=8080

# File-based storage path (relative to working directory)
shopwave.data.path=./data

# JWT configuration
shopwave.jwt.secret=shopwave-super-secret-key-change-in-production-2025
shopwave.jwt.expiration=86400000

# CORS - allow React dev server
shopwave.cors.origins=http://localhost:3000,http://localhost:3001

# Disable default Spring Security login page
spring.security.user.name=admin
spring.security.user.password=disabled

# Logging
logging.level.com.shopwave=INFO
